<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>COIN DIGEST</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1c1c1e;
      color: #f5f5f7;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #header {
      padding: 20px 16px 12px 16px;
      text-align: center;
      background: linear-gradient(180deg, rgba(28,28,30,1) 0%, rgba(28,28,30,0) 100%);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    #header h1 {
      font-family: 'Georgia', serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #f5f5f7 0%, #0a84ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      text-shadow: 0 2px 20px rgba(10,132,255,0.2);
    }
    #header .subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 80px 16px;
    }
    #content::-webkit-scrollbar {
      width: 4px;
    }
    #content::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
    }
    .news-item {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: 0.2s;
      animation: fadeIn 0.3s ease;
    }
    .news-item:active {
      background: rgba(255,255,255,0.12);
    }
    .news-item a {
      color: #0a84ff;
      text-decoration: none;
      font-size: 15px;
      line-height: 1.4;
      display: block;
    }
    .news-item .date {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      margin-top: 6px;
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.3);
    }
    .loading .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: #0a84ff;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.3);
    }
    .error {
      text-align: center;
      padding: 20px;
      color: #ff453a;
    }
    .last-update {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      margin-top: 10px;
      padding-bottom: 10px;
    }
    #bottomTabs {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 32px;
      background: rgba(44, 44, 46, 0.85);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      padding: 10px 28px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 100;
    }
    #bottomTabs button {
      background: transparent;
      border: none;
      font-size: 24px;
      color: rgba(255,255,255,0.4);
      padding: 4px 0;
      cursor: pointer;
      transition: 0.2s;
      min-width: 32px;
      text-align: center;
    }
    #bottomTabs button.active {
      color: #0a84ff;
      transform: scale(1.1);
    }
    #bottomTabs button:active {
      transform: scale(0.9);
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>COIN DIGEST</h1>
    <div class="subtitle">Крипто-дайджест</div>
  </div>
  <div id="content">
    <div id="newsList">
      <div class="loading">
        <div class="spinner"></div>
        <div>Загрузка новостей...</div>
      </div>
    </div>
    <div class="last-update" id="lastUpdate"></div>
  </div>
  <div id="bottomTabs">
    <button class="active" data-tab="all">📰</button>
    <button data-tab="main">🔥</button>
    <button data-tab="alt">🪙</button>
    <button data-tab="exclusive">🔒</button>
  </div>
  <script>
    let currentTab = 'all';
    let newsData = [];
    async function loadNews() {
      try {
        const response = await fetch('/api/news');
        const data = await response.json();
        newsData = data.news || [];
        if (data.stats.lastUpdate) {
          document.getElementById('lastUpdate').textContent = '🕐 ' + new Date(data.stats.lastUpdate).toLocaleString();
        }
        renderNews(currentTab);
      } catch(e) {
        document.getElementById('newsList').innerHTML = '<div class="error">❌ Ошибка загрузки новостей</div>';
        console.error(e);
      }
    }
    function renderNews(tab) {
      const list = document.getElementById('newsList');
      let filtered = newsData;
      if (tab === 'main') filtered = newsData.filter(n => n.category === 'Основные');
      else if (tab === 'alt') filtered = newsData.filter(n => n.category === 'Альткоины');
      else if (tab === 'exclusive') filtered = newsData.filter(n => n.category === 'Эксклюзив');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty"><div style="font-size: 48px; margin-bottom: 16px;">📭</div><div>Новостей в этой категории пока нет</div></div>';
        return;
      }
      list.innerHTML = filtered.map(item => {
        const date = item.pubDate ? new Date(item.pubDate).toLocaleDateString('ru-RU') : 'Сегодня';
        return '<div class="news-item"><a href="' + item.link + '" target="_blank">' + item.title + '</a><div class="date">📅 ' + date + '</div></div>';
      }).join('');
    }
    document.querySelectorAll('#bottomTabs button').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('#bottomTabs button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentTab = this.dataset.tab;
        renderNews(currentTab);
      });
    });
    loadNews();
    setInterval(loadNews, 60000);
  </script>
</body>
</html>
